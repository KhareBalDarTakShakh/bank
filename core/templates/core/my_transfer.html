{% extends "core/base.html" %}
{% block title %}Transfer Money{% endblock %}
{% block content %}
<h2>Transfer Money</h2>
<form method="post" class="card p-4 shadow">
    {% csrf_token %}
    <div class="mb-3">
        <label for="from_account_id" class="form-label">From Account</label>
        <select name="from_account_id" id="from_account_id" class="form-select" required>
            <option value="">-- Select Account --</option>
            {% for acc in accounts %}
                <option value="{{ acc.id }}">{{ acc.account_number }} ({{ acc.account_type_name }}, Balance: {{ acc.balance }})</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="to_account_number" class="form-label">To Account Number</label>
        <input type="text" name="to_account_number" id="to_account_number" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="amount" class="form-label">Amount</label>
        <input type="number" step="0.01" name="amount" id="amount" class="form-control" required>
    </div>
    <div class="d-flex justify-content-between">
        <button type="submit" class="btn btn-success">Transfer</button>
        <a href="{% url 'customer_dashboard' %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
