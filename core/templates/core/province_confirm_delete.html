{% extends "core/base.html" %}
{% block title %}Delete Province{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white"><h4>Confirm Deletion</h4></div>
            <div class="card-body">
                <p>Delete province <strong>{{ province.name }}</strong> ({{ province.country_name }})?</p>
                <form method="post" action="{% url 'province_delete' province.id %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'province_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
