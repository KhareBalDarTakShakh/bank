{% extends "core/base.html" %}
{% block title %}{% if province %}Edit{% else %}Add{% endif %} Province{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>{% if province %}Edit{% else %}Add{% endif %} Province</h2>
        <form method="post" action="{% if province %}{% url 'province_edit' province.id %}{% else %}{% url 'province_add' %}{% endif %}" class="card p-4 shadow">
            {% csrf_token %}
            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" class="form-control" value="{{ province.name|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label>Country</label>
                <select name="country_id" class="form-select" required>
                    <option value="">-- Select Country --</option>
                    {% for c in countries %}
                        <option value="{{ c.id }}" {% if province and province.country_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-success">Save</button>
                <a href="{% url 'province_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
