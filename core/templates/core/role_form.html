{% extends "core/base.html" %}

{% block title %}{% if role %}Edit Role{% else %}Add New Role{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>{% if role %}Edit Role{% else %}Add New Role{% endif %}</h2>

        <form method="post"
              action="{% if role %}{% url 'role_edit' role.id %}{% else %}{% url 'role_add' %}{% endif %}"
              class="card p-4 shadow">
            {% csrf_token %}

            <div class="mb-3">
                <label for="name" class="form-label">Role Name</label>
                <input type="text" name="name" id="name" class="form-control"
                       value="{{ role.name|default:'' }}" required>
            </div>

            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-success">Save</button>
                <a href="{% url 'role_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
