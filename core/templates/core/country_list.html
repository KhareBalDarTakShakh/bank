{% extends "core/base.html" %}
{% block title %}Countries{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Countries</h2>
    <a href="{% url 'country_add' %}" class="btn btn-primary">+ Add Country</a>
</div>
<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr><th>ID</th><th>Name</th><th>ISO Code</th><th>Actions</th></tr>
    </thead>
    <tbody>
        {% for c in countries %}
        <tr>
            <td>{{ c.id }}</td><td>{{ c.name }}</td><td>{{ c.iso_code }}</td>
            <td>
                <a href="{% url 'country_edit' c.id %}" class="btn btn-sm btn-outline-warning">Edit</a>
                <a href="{% url 'country_delete' c.id %}" class="btn btn-sm btn-outline-danger">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="4">No countries.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
