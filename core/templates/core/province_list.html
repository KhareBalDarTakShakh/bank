{% extends "core/base.html" %}
{% block title %}Provinces{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Provinces</h2>
    <a href="{% url 'province_add' %}" class="btn btn-primary">+ Add Province</a>
</div>
<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr><th>ID</th><th>Name</th><th>Country</th><th>Actions</th></tr>
    </thead>
    <tbody>
        {% for p in provinces %}
        <tr>
            <td>{{ p.id }}</td><td>{{ p.name }}</td><td>{{ p.country_name }}</td>
            <td>
                <a href="{% url 'province_edit' p.id %}" class="btn btn-sm btn-outline-warning">Edit</a>
                <a href="{% url 'province_delete' p.id %}" class="btn btn-sm btn-outline-danger">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="4">No provinces.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
