{% extends "core/base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>{{ title }}</h2>
        <form method="post" class="card p-4 shadow">
            {% csrf_token %}
            {% if type == 'transfer' %}
            <div class="mb-3">
                <label for="from_account" class="form-label">From Account Number</label>
                <input type="text" name="from_account" id="from_account" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="to_account" class="form-label">To Account Number</label>
                <input type="text" name="to_account" id="to_account" class="form-control" required>
            </div>
            {% elif type == 'deposit' %}
            <div class="mb-3">
                <label for="to_account" class="form-label">To Account Number</label>
                <input type="text" name="to_account" id="to_account" class="form-control" required>
            </div>
            {% elif type == 'withdrawal' %}
            <div class="mb-3">
                <label for="from_account" class="form-label">From Account Number</label>
                <input type="text" name="from_account" id="from_account" class="form-control" required>
            </div>
            {% endif %}
            <div class="mb-3">
                <label for="amount" class="form-label">Amount</label>
                <input type="number" step="0.01" name="amount" id="amount" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <input type="text" name="description" id="description" class="form-control">
            </div>
            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-primary">Submit</button>
                <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
