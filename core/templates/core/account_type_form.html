{% extends "core/base.html" %}

{% block title %}{% if account_type %}Edit Account Type{% else %}Add Account Type{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>{% if account_type %}Edit Account Type{% else %}Add Account Type{% endif %}</h2>

        <form method="post"
              action="{% if account_type %}{% url 'account_type_edit' account_type.id %}{% else %}{% url 'account_type_add' %}{% endif %}"
              class="card p-4 shadow">
            {% csrf_token %}

            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" name="name" id="name" class="form-control"
                       value="{{ account_type.name|default:'' }}" required>
            </div>

            <div class="mb-3">
                <label for="interest_rate" class="form-label">Interest Rate (%)</label>
                <input type="number" step="0.01" name="interest_rate" id="interest_rate" class="form-control"
                       value="{{ account_type.interest_rate|default:'' }}">
                <small class="form-text text-muted">e.g., 10.00 for 10%</small>
            </div>

            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-success">Save</button>
                <a href="{% url 'account_type_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
