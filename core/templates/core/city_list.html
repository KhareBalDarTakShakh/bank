{% extends "core/base.html" %}
{% block title %}Cities{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Cities</h2>
    <a href="{% url 'city_add' %}" class="btn btn-primary">+ Add City</a>
</div>
<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr><th>ID</th><th>Name</th><th>Province</th><th>Country</th><th>Actions</th></tr>
    </thead>
    <tbody>
        {% for c in cities %}
        <tr>
            <td>{{ c.id }}</td><td>{{ c.name }}</td><td>{{ c.province_name }}</td><td>{{ c.country_name }}</td>
            <td>
                <a href="{% url 'city_edit' c.id %}" class="btn btn-sm btn-outline-warning">Edit</a>
                <a href="{% url 'city_delete' c.id %}" class="btn btn-sm btn-outline-danger">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="5">No cities.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
