{% extends "core/base.html" %}

{% block title %}{% if employee %}Edit Employee{% else %}Add New Employee{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2>{% if employee %}Edit Employee{% else %}Add New Employee{% endif %}</h2>

        <form method="post"
              action="{% if employee %}{% url 'employee_edit' employee.id %}{% else %}{% url 'employee_add' %}{% endif %}"
              class="card p-4 shadow">
            {% csrf_token %}

            <div class="mb-3">
                <label for="full_name" class="form-label">Full Name</label>
                <input type="text" name="full_name" id="full_name" class="form-control"
                       value="{{ employee.full_name|default:'' }}" required>
            </div>

            <div class="mb-3">
                <label for="national_code" class="form-label">National Code</label>
                <input type="text" name="national_code" id="national_code" class="form-control"
                       value="{{ employee.national_code|default:'' }}" required>
            </div>

            <div class="mb-3">
                <label for="phone_number" class="form-label">Phone Number</label>
                <input type="text" name="phone_number" id="phone_number" class="form-control"
                       value="{{ employee.phone_number|default:'' }}">
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" name="email" id="email" class="form-control"
                       value="{{ employee.email|default:'' }}">
            </div>

            <div class="mb-3">
                <label for="branch_id" class="form-label">Branch</label>
                <select name="branch_id" id="branch_id" class="form-select" required>
                    <option value="">-- Select Branch --</option>
                    {% for b in branches %}
                        <option value="{{ b.id }}" {% if employee and employee.branch_id == b.id %}selected{% endif %}>
                            {{ b.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="role_id" class="form-label">Role</label>
                <select name="role_id" id="role_id" class="form-select" required>
                    <option value="">-- Select Role --</option>
                    {% for r in roles %}
                        <option value="{{ r.id }}" {% if employee and employee.role_id == r.id %}selected{% endif %}>
                            {{ r.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" name="username" id="username" class="form-control"
                       value="{{ employee.username|default:'' }}" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">
                    Password
                    {% if employee %}<small class="text-muted"> (leave blank to keep current)</small>{% endif %}
                </label>
                <input type="password" name="password" id="password" class="form-control"
                       {% if not employee %}required{% endif %}>
            </div>

            <div class="mb-3">
                <label for="acount_status" class="form-label">Account Status</label>
                <select name="acount_status" id="acount_status" class="form-select">
                    <option value="1" {% if not employee or employee.acount_status == 1 %}selected{% endif %}>Active</option>
                    <option value="0" {% if employee and employee.acount_status == 0 %}selected{% endif %}>Inactive</option>
                </select>
            </div>

            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-success">Save</button>
                <a href="{% url 'employee_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
