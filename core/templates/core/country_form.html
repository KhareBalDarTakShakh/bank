{% extends "core/base.html" %}
{% block title %}{% if country %}Edit{% else %}Add{% endif %} Country{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>{% if country %}Edit{% else %}Add{% endif %} Country</h2>
        <form method="post" action="{% if country %}{% url 'country_edit' country.id %}{% else %}{% url 'country_add' %}{% endif %}" class="card p-4 shadow">
            {% csrf_token %}
            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" class="form-control" value="{{ country.name|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label>ISO Code (2 letters)</label>
                <input type="text" name="iso_code" class="form-control" value="{{ country.iso_code|default:'' }}" maxlength="2" required>
            </div>
            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-success">Save</button>
                <a href="{% url 'country_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
