{% extends "core/base.html" %}

{% block title %}Delete Role{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Confirm Deletion</h4>
            </div>
            <div class="card-body">
                <p class="lead">Are you sure you want to delete this role?</p>
                <ul class="list-group mb-3">
                    <li class="list-group-item">
                        <strong>Name:</strong> {{ role.name }}
                    </li>
                </ul>

                <form method="post" action="{% url 'role_delete' role.id %}">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                        <a href="{% url 'role_list' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
